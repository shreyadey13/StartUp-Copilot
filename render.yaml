services:
  # FastAPI backend service
  - type: web
    name: startup-copilot-backend
    env: docker
    dockerFilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    preDeployCommand: alembic upgrade head
    envVars:
      - key: APP_NAME
        value: "AI Startup Copilot API"
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: API_V1_PREFIX
        value: /api/v1
      - key: DATABASE_URL
        fromDatabase:
          name: startup-copilot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: startup-copilot-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: LOG_LEVEL
        value: INFO

  # Redis service
  - type: redis
    name: startup-copilot-redis
    plan: free
    ipAllowList: []

databases:
  - name: startup-copilot-db
    plan: free
