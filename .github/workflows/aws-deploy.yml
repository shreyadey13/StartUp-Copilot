name: AWS Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        type: choice
        options: [staging, production]
        default: staging

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Build and push API image
        run: |
          docker build -t ${{ steps.ecr.outputs.registry }}/startup-copilot-api:${{ github.sha }} ./backend
          docker push ${{ steps.ecr.outputs.registry }}/startup-copilot-api:${{ github.sha }}
      - name: Build and push frontend image
        run: |
          docker build --build-arg NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL }} -t ${{ steps.ecr.outputs.registry }}/startup-copilot-frontend:${{ github.sha }} ./frontend
          docker push ${{ steps.ecr.outputs.registry }}/startup-copilot-frontend:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Configure kubectl
        run: aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
      - name: Deploy with Helm
        run: |
          helm upgrade --install startup-copilot ./infra/helm/startup-copilot \
            --namespace startup-copilot-${{ inputs.environment }} \
            --create-namespace \
            --set image.tag=${{ github.sha }} \
            --atomic \
            --timeout 10m

