apiVersion: apps/v1
kind: Deployment
metadata:
  name: startup-copilot-frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: startup-copilot-frontend
  template:
    metadata:
      labels:
        app: startup-copilot-frontend
    spec:
      containers:
        - name: frontend
          image: {{ include "startup-copilot.image" (dict "root" . "repository" .Values.frontend.image.repository) }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.frontend.port }}
          env:
            {{- range $key, $value := .Values.frontend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /login
              port: {{ .Values.frontend.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /login
              port: {{ .Values.frontend.port }}
            initialDelaySeconds: 30
            periodSeconds: 20

