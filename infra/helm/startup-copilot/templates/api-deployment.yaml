apiVersion: apps/v1
kind: Deployment
metadata:
  name: startup-copilot-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: startup-copilot-api
  template:
    metadata:
      labels:
        app: startup-copilot-api
    spec:
      containers:
        - name: api
          image: {{ include "startup-copilot.image" (dict "root" . "repository" .Values.api.image.repository) }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.api.port }}
          env:
            {{- range $key, $value := .Values.api.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: startup-copilot-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: startup-copilot-secrets
                  key: REDIS_URL
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: startup-copilot-secrets
                  key: JWT_SECRET_KEY
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 30
            periodSeconds: 20

